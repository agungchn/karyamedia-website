<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4E5A3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AA8C2C;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (dark) -->
  <rect width="512" height="512" fill="#111111"/>

  <!-- Star/Gear shape -->
  <g filter="url(#shadow)">
    <path d="M 256 80
             L 280 160 L 360 120 L 340 200 L 420 220 L 340 260
             L 360 340 L 280 300 L 256 380 L 232 300 L 152 340
             L 172 260 L 92 220 L 172 200 L 152 120 L 232 160 Z"
          fill="url(#goldGrad)"
          stroke="#8B7500"
          stroke-width="2"/>
  </g>

  <!-- Text KARYAMEDIA -->
  <text x="256" y="430"
        font-family="Arial, sans-serif"
        font-size="42"
        font-weight="bold"
        fill="#F4E5A3"
        text-anchor="middle"
        letter-spacing="2">KARYAMEDIA</text>

  <!-- Text SOUVENIR -->
  <text x="256" y="470"
        font-family="Arial, sans-serif"
        font-size="28"
        font-weight="600"
        fill="#D4AF37"
        text-anchor="middle"
        letter-spacing="4">SOUVENIR</text>
</svg>
